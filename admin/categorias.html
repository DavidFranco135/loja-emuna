<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Categorias — Painel Emuná</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/admin.css" />
</head>
<body>
<div class="admin-shell">
  <div id="sidebar-placeholder"></div>

  <main class="admin-main">
    <div class="panel">
      <div class="panel__header">
        <h2>Categorias</h2>
        <button class="btn btn--primary" id="new-category-btn">+ Nova categoria</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead><tr><th></th><th>Nome</th><th>Ícone</th><th>Ordem</th><th></th></tr></thead>
          <tbody id="categories-body"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="admin-modal-backdrop" id="category-backdrop"></div>
<div class="admin-slideover" id="category-slideover" aria-hidden="true" style="width:min(420px,94vw)">
  <div class="admin-slideover__header">
    <h2 id="category-form-title">Nova categoria</h2>
    <button class="admin-slideover__close" id="category-form-close" aria-label="Fechar">×</button>
  </div>
  <form id="category-form">
    <input type="hidden" id="cf-id" />
    <div class="form-grid">
      <label class="field field--wide">Nome
        <input type="text" id="cf-name" required />
      </label>
      <label class="field">Ícone (emoji)
        <input type="text" id="cf-icon" maxlength="4" placeholder="🧶" />
      </label>
      <label class="field">Ordem de exibição
        <input type="number" id="cf-order" min="1" required />
      </label>
      <div class="field field--wide">
        <span>Imagem da categoria</span>
        <div class="image-thumb-list" id="cf-image-thumb"></div>
        <label class="btn btn--ghost btn--sm upload-label">
          📷 Enviar imagem
          <input type="file" id="cf-image-upload" accept="image/*" hidden />
        </label>
        <p class="upload-status" id="cf-upload-status"></p>
      </div>
    </div>
    <div class="admin-slideover__footer">
      <button type="submit" class="btn btn--primary">Salvar categoria</button>
      <button type="button" class="btn btn--ghost" id="category-form-cancel">Cancelar</button>
    </div>
  </form>
</div>

<script type="module" src="js/admin-categories.js"></script>
</body>
</html>
